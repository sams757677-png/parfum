<html lang="ru">
<head>

  <!-- Google Fonts & Font Awesome -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: radial-gradient(circle at 10% 20%, #0a0a0a, #000000);
      color: #f5f5f5;
      font-family: 'Montserrat', sans-serif;
      line-height: 1.5;
      scroll-behavior: smooth;
    }

    /* Custom scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
    }
    ::-webkit-scrollbar-track {
      background: #1a1a1a;
    }
    ::-webkit-scrollbar-thumb {
      background: #d4af37;
      border-radius: 10px;
    }

    /* Hero Section */
    .hero {
      text-align: center;
      padding: 60px 20px 50px;
      background: linear-gradient(135deg, rgba(0,0,0,0.85), rgba(0,0,0,0.95));
      border-bottom: 1px solid rgba(212, 175, 55, 0.3);
    }
    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.4rem, 8vw, 4.2rem);
      letter-spacing: 2px;
      background: linear-gradient(135deg, #fff, #d4af37);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 12px;
    }
    .hero p {
      font-size: 1.1rem;
      opacity: 0.85;
      margin-bottom: 28px;
    }
    .cta {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: linear-gradient(95deg, #d4af37, #f5e27b);
      color: #0a0a0a;
      padding: 14px 28px;
      border-radius: 50px;
      text-decoration: none;
      font-weight: 700;
      font-size: 1rem;
      transition: all 0.3s ease;
      box-shadow: 0 8px 20px rgba(212, 175, 55, 0.3);
      border: none;
    }
    .cta i {
      font-size: 1.3rem;
    }
    .cta:hover {
      transform: scale(1.02);
      background: linear-gradient(95deg, #e6c24a, #ffe28a);
      box-shadow: 0 12px 26px rgba(212, 175, 55, 0.5);
    }

    /* Filter Bar */
    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      margin: 40px 20px 30px;
    }
    .filter-btn {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(212, 175, 55, 0.5);
      color: #e0e0e0;
      padding: 10px 24px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.25s;
      backdrop-filter: blur(4px);
    }
    .filter-btn i {
      margin-right: 8px;
    }
    .filter-btn.active {
      background: #d4af37;
      color: #000;
      border-color: #d4af37;
      box-shadow: 0 0 12px rgba(212, 175, 55, 0.5);
    }
    .filter-btn:hover:not(.active) {
      background: rgba(212, 175, 55, 0.2);
      border-color: #d4af37;
      color: #fff;
    }

    /* Catalog Grid */
    .catalog {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 28px;
      padding: 20px 30px 50px;
      max-width: 1500px;
      margin: 0 auto;
    }

    /* Card Animation */
    .card-wrapper {
      transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      opacity: 1;
      transform: scale(1);
    }
    .card-wrapper.hide {
      display: none;
      opacity: 0;
      transform: scale(0.96);
    }

    .card {
      background: rgba(20, 20, 30, 0.65);
      backdrop-filter: blur(2px);
      border-radius: 28px;
      overflow: hidden;
      border: 1px solid rgba(212, 175, 55, 0.25);
      transition: all 0.35s ease;
      box-shadow: 0 12px 28px -10px rgba(0,0,0,0.5);
      height: 100%;
      display: flex;
      flex-direction: column;
    }
    .card:hover {
      transform: translateY(-6px);
      border-color: rgba(212, 175, 55, 0.7);
      box-shadow: 0 24px 36px -12px rgba(0,0,0,0.6);
      background: rgba(30, 30, 40, 0.8);
    }

    .card-img {
      position: relative;
      overflow: hidden;
      height: 220px;
    }
    .card-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.5s;
    }
    .card:hover .card-img img {
      transform: scale(1.04);
    }
    .badge {
      position: absolute;
      top: 14px;
      left: 14px;
      background: linear-gradient(120deg, #d4af37, #e6c864);
      color: #0a0a0a;
      padding: 6px 14px;
      border-radius: 60px;
      font-size: 0.75rem;
      font-weight: 800;
      z-index: 2;
      box-shadow: 0 3px 8px rgba(0,0,0,0.2);
    }
    .card-body {
      padding: 20px 18px 22px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .card-title {
      font-size: 1.35rem;
      font-weight: 700;
      font-family: 'Playfair Display', serif;
      margin-bottom: 6px;
      letter-spacing: -0.2px;
    }
    .tag {
      color: #d4af37;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .tag i {
      font-size: 0.7rem;
    }
    .desc {
      font-size: 0.85rem;
      opacity: 0.75;
      margin-bottom: 16px;
      line-height: 1.4;
    }
    .price {
      font-weight: 700;
      font-size: 1.3rem;
      color: #f5e27b;
      margin: 10px 0 6px;
    }
    .price1 {
      font-weight: 700;
      font-size: 1.3rem;
      color: #f5e27b;
      margin: 10px 0 6px;
    }
    .price small {
      font-size: 0.75rem;
      font-weight: 400;
      opacity: 0.7;
    }
    .price1 small {
      font-size: 0.75rem;
      font-weight: 400;
      opacity: 0.7;
    }
    .rating {
      color: #d4af37;
      font-size: 0.8rem;
      letter-spacing: 2px;
      margin-bottom: 12px;
    }
    .buy-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: rgba(212, 175, 55, 0.12);
      border: 1px solid rgba(212, 175, 55, 0.5);
      padding: 12px 0;
      border-radius: 40px;
      text-decoration: none;
      color: #f5e27b;
      font-weight: 600;
      margin-top: auto;
      transition: 0.25s;
    }
    .buy-btn i {
      font-size: 1rem;
    }
    .buy-btn:hover {
      background: #d4af37;
      color: #0a0a0a;
      border-color: #d4af37;
    }

    /* Trust Section */
    .trust-section {
      background: rgba(0,0,0,0.6);
      border-top: 1px solid rgba(212, 175, 55, 0.2);
      border-bottom: 1px solid rgba(212, 175, 55, 0.2);
      padding: 35px 20px;
      margin-top: 20px;
    }
    .trust-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 40px;
      max-width: 1100px;
      margin: 0 auto;
      text-align: center;
    }
    .trust-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      font-weight: 500;
    }
    .trust-item i {
      font-size: 2rem;
      color: #d4af37;
    }
    .trust-item span {
      font-size: 0.9rem;
    }

    /* Footer */
    .footer {
      text-align: center;
      padding: 30px 20px;
      font-size: 0.8rem;
      opacity: 0.6;
    }

    /* Responsive */
    @media (max-width: 640px) {
      .catalog {
        padding: 20px 16px 40px;
        gap: 20px;
      }
      .filter-bar {
        gap: 8px;
        margin: 24px 12px;
      }
      .filter-btn {
        padding: 6px 16px;
        font-size: 0.8rem;
      }
      .card-img {
        height: 180px;
      }
      .hero {
        padding: 40px 16px 35px;
      }
    }

    @media (min-width: 1200px) {
      .catalog {
        grid-template-columns: repeat(4, 1fr);
      }
    }

    /* smooth filter */
    .card-wrapper {
      transition: opacity 0.25s ease, transform 0.2s ease;
    }
  </style>
</head>

  // Функция для генерации звёзд рейтинга
  function renderStars(rating) {
    let stars = '';
    for(let i=1; i<=5; i++) {
      if(i <= rating) stars += '<i class="fas fa-star"></i>';
      else stars += '<i class="far fa-star"></i>';
    }
    return stars;
  }

  // Контейнер
  const container = document.getElementById('catalogContainer');
  let currentFilter = 'all';

  // Отрисовка карточек на основе текущего фильтра
  function renderCatalog() {
    if(!container) return;
    const filtered = currentFilter === 'all' ? perfumes : perfumes.filter(p => p.type === currentFilter);
    
    let html = '';
    filtered.forEach(perf => {
      const badgeHtml = perf.badge ? `<div class="badge">${perf.badge}</div>` : '';
      const waLink = `https://wa.me/41790000000?text=${encodeURIComponent(perf.waMsg + ' — RAM PERFUME')}`;
      
      html += `
        <div class="card-wrapper" data-type="${perf.type}">
          <div class="card">
            <div class="card-img">
              <img src="${perf.img}" alt="${perf.name}" loading="lazy">
              ${badgeHtml}
            </div>
            <div class="card-body">
              <div class="card-title">${perf.name}</div>
              <div class="tag"><i class="fas fa-tag"></i> ${perf.tag}</div>
              <div class="desc">${perf.desc}</div>
              <div class="rating">${renderStars(perf.rating)}</div>
              <div class="price">${perf.price} <small>/${perf.volume}</small></div>
              <div class="price1">${perf.price1} <small>/${perf.volume1}</small></div>
              <a href="${waLink}" class="buy-btn" target="_blank" rel="noopener noreferrer">
                <i class="fab fa-whatsapp"></i> Заказать
              </a>
            </div>
          </div>
        </div>
      `;
    });
    
    if(filtered.length === 0) {
      html = `<div style="grid-column:1/-1; text-align:center; padding:60px 20px;"><i class="fas fa-box-open" style="font-size:3rem; opacity:0.6;"></i><p style="margin-top:15px;">Нет ароматов в этой категории, загляните позже ✨</p></div>`;
    }
    
    container.innerHTML = html;
  }

  // Функция фильтрации с плавным эффектом (используем перерисовку + анимация через классы)
  function setFilter(filterValue) {
    currentFilter = filterValue;
    
    // Обновляем активные кнопки
    document.querySelectorAll('.filter-btn').forEach(btn => {
      if(btn.dataset.filter === filterValue) {
        btn.classList.add('active');
      } else {
        btn.classList.remove('active');
      }
    });
    
    // Небольшая анимация: сначала легкий fade, затем перерисовка
    const cardsContainer = container;
    if(cardsContainer) {
      cardsContainer.style.opacity = '0.5';
      cardsContainer.style.transition = 'opacity 0.2s';
      setTimeout(() => {
        renderCatalog();
        cardsContainer.style.opacity = '1';
      }, 150);
    } else {
      renderCatalog();
    }
  }

  // Инициализируем каталог и обработчики
  function init() {
    renderCatalog();
    
    // Вешаем обработчики на кнопки фильтрации
    const buttons = document.querySelectorAll('.filter-btn');
    buttons.forEach(btn => {
      btn.addEventListener('click', (e) => {
        const filterVal = btn.dataset.filter;
        setFilter(filterVal);
      });
    });
  }

  init();

  // Дополнительно плавная адаптация для мобильных, чтобы карточки отображались красиво
  // Добавим observer или просто оставим - всё готово
  // Также можно добавить небольшой фикс для корректного отображения после загрузки
  window.addEventListener('load', () => {
    // Убираем возможные баги с расположением сетки на устройствах
    if(container) {
      container.style.opacity = '1';
    }
  });
</script>

<script>
function openApp(appUrl, webUrl) {

const timeout = setTimeout(() => {
    window.location.href = webUrl;
}, 1200);

window.location.href = appUrl;

window.onblur = () => clearTimeout(timeout);

}
</script>
