    .modal-overlay {

      top: 0;
      left: 0;
      width: 100%;
      height: 100%;

      justify-content: center;

      visibility: hidden;
      transition: all 0.3s ease;

      opacity: 1;

      max-height: 90vh;

      height: auto;

      { id: 50, name: "Kilian Good Girl Gone Bad", tag: "Шлейф • Мягкий", desc: "Kilian Good Girl Gone Bad — роскошный цветочно-фруктовый аромат с нотами жасмина, туберозы, османтуса и мягкой сладости.", price: "800 руб.", volume: "10 мл", price1: "3500 руб.", volume1: "50 мл", type: "women", img: "img_katalog/Kilian Good Girl Gone Bad.webp", waMsg: "Хочу Kilian Good Girl Gone Bad" },
      { id: 51, name: "RICHARD MAISON DE PARFUM WHITE CHOCOLA EXTRAIT", tag: "Шлейф • Сильный", desc: "Richard Maison de Parfum White Chocola Extrait — роскошный гурманский аромат с акцентом на белый шоколад, сливочные и ванильные ноты, дополненные мягкими древесными оттенками. Звучит насыщенно, сладко и очень уютно, создавая эффект дорогого десерта.", price: "800 руб.", volume: "10 мл", price1: "3500 руб.", volume1: "50 мл", type: "unisex", img: "img_katalog/RICHARD MAISON DE PARFUM WHITE CHOCOLA EXTRAIT.webp", waMsg: "Хочу RICHARD MAISON DE PARFUM WHITE CHOCOLA EXTRAIT" },
      { id: 52, name: "GUERLAIN CHAMPS ELYSEES", tag: "Шлейф • Средний", desc: "Guerlain Champs-Élysées — элегантный цветочно-фруктовый аромат с нотами мимозы, розы, сирени, персика и миндаля. Звучит солнечно, утончённо и очень женственно, создавая атмосферу весеннего Парижа.", price: "800 руб.", volume: "10 мл", price1: "3500 руб.", volume1: "50 мл", type: "women", img: "img_katalog/GUERLAIN CHAMPS ELYSEES.webp", waMsg: "Хочу GUERLAIN CHAMPS ELYSEES" },
      { id: 53, name: "GUCCI Flora Gentle Magnolia", tag: "Шлейф • Средний", desc: "Gucci Flora Gorgeous Magnolia — яркий цветочно-фруктовый аромат с нотами магнолии, ежевики, кокоса и пачули. Звучит нежно, солнечно и женственно, сочетая свежесть цветов со сладкой фруктовой мягкостью.", price: "800 руб.", volume: "10 мл", price1: "3500 руб.", volume1: "50 мл", type: "women", img: "img_katalog/GUCCI Flora Gentle Magnolia.webp", waMsg: "Хочу GUCCI Flora Gentle Magnolia" }
    
    ];
    
    const perfumes = perfumesRaw.map(p => ({ ...p, price2: "6000 руб.", volume2: "100 мл" }));
    
    function getGenderLabel(type) {
      if (type === 'men') return 'МУЖСКИЕ';
      if (type === 'women') return 'ЖЕНСКИЕ';
      return 'УНИСЕКС';
    }
    
    let currentFilter = 'all';
    let searchQuery = '';
    let sortByNameActive = false;
    const container = document.getElementById('catalogContainer');
    
    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
      });
    }
    
    function getFilteredAndSortedPerfumes() {
      let filtered = currentFilter === 'all' ? [...perfumes] : perfumes.filter(p => p.type === currentFilter);
      if (searchQuery.trim() !== '') {
        const query = searchQuery.trim().toLowerCase();
        filtered = filtered.filter(p =>
          p.name.toLowerCase().includes(query) ||
          p.tag.toLowerCase().includes(query) ||
          p.desc.toLowerCase().includes(query)
        );
      }
      if (sortByNameActive) {
        filtered.sort((a, b) => a.name.localeCompare(b.name, 'ru', { sensitivity: 'base' }));
      } else {
        filtered.sort((a, b) => a.id - b.id);
      }
      return filtered;
    }
    
    function renderCatalog() {
      if (!container) return;
      const filtered = getFilteredAndSortedPerfumes();
      let html = '';
      filtered.forEach(perf => {
        const badgeHtml = perf.badge ? `<div class="badge">${perf.badge}</div>` : '';
        const waLink = `https://wa.me/+79991979994?text=${encodeURIComponent(perf.waMsg + ' — PERFUME')}`;
        html += `
          <div class="card-wrapper" data-type="${perf.type}">
            <div class="card">
              <div class="card-img">
                <img src="${perf.img}" alt="${escapeHtml(perf.name)}" loading="lazy">
                ${badgeHtml}
              </div>
              <div class="card-body">
                <div class="card-title">${escapeHtml(perf.name)}</div>
                <div class="tag"><i class="fas fa-tag"></i> ${escapeHtml(perf.tag)}</div>
                <div class="desc">${escapeHtml(perf.desc)}</div>
                <div class="gender-type"><i class="fas ${perf.type === 'men' ? 'fa-mars' : (perf.type === 'women' ? 'fa-venus' : 'fa-genderless')}"></i> ${getGenderLabel(perf.type)}</div>
                <div class="price">${perf.price} <small>/${perf.volume}</small></div>
                <div class="price1">${perf.price1} <small>/${perf.volume1}</small></div>
                <div class="price2">${perf.price2} <small>/${perf.volume2}</small></div>
                <a href="${waLink}" class="buy-btn" target="_blank" rel="noopener noreferrer">
                  <i class="fab fa-whatsapp"></i> Заказать
                </a>
              </div>
            </div>
          </div>
        `;
      });
      if (filtered.length === 0) {
        html = `<div style="grid-column:1/-1; text-align:center; padding:60px 20px;">
                  <i class="fas fa-box-open" style="font-size:3rem; opacity:0.6;"></i>
                  <p style="margin-top:15px;">Ничего не найдено по запросу «${escapeHtml(searchQuery)}» ✨</p>
                  <p style="margin-top:8px; font-size:0.85rem; opacity:0.7;">Попробуйте изменить поиск или категорию</p>
                </div>`;
      }
      container.style.opacity = '0.4';
      container.style.transition = 'opacity 0.2s';
      setTimeout(() => {
        container.innerHTML = html;
        container.style.opacity = '1';
      }, 150);
    }
    
    function updateActiveFilterButton() {
      document.querySelectorAll('.filter-btn').forEach(btn => {
        if (btn.dataset.filter === currentFilter) btn.classList.add('active');
        else btn.classList.remove('active');
      });
    }
    
    function updateSortButtonUI() {
      const sortBtn = document.getElementById('sortByNameBtn');
      if (sortBtn) {
        if (sortByNameActive) {
          sortBtn.classList.add('active');
          sortBtn.innerHTML = '<i class="fas fa-sort-alpha-down"></i> Сортировка: А–Я (вкл)';
        } else {
          sortBtn.classList.remove('active');
          sortBtn.innerHTML = '<i class="fas fa-sort-alpha-down"></i> Сортировка: А–Я';
        }
      }
    }
    
    function setFilter(filterValue) { currentFilter = filterValue; updateActiveFilterButton(); renderCatalog(); }
    function setSearchQuery(query) { 
      searchQuery = query; 
      const searchInput = document.getElementById('searchInput');
      if (searchInput && searchInput.value !== query) searchInput.value = query;
      renderCatalog();
    }
    function toggleSortByName() { sortByNameActive = !sortByNameActive; updateSortButtonUI(); renderCatalog(); }
    
    // ---------- МОДАЛЬНОЕ ОКНО ДЛЯ УВЕЛИЧЕНИЯ ФОТО ----------
    const modal = document.getElementById('imageModal');
    const modalImg = document.getElementById('modalImage');
    const closeModalBtn = document.getElementById('modalCloseBtn');
    
    function openModal(imageSrc) {
      if (!modal || !modalImg) return;
      modalImg.src = imageSrc;
      modal.classList.add('active');
      document.body.style.overflow = 'hidden';
    }
    
    function closeModal() {
      if (!modal) return;
      modal.classList.remove('active');
      document.body.style.overflow = '';
      setTimeout(() => { if (modalImg) modalImg.src = ''; }, 200);
    }
    
    if (modal) {
      modal.addEventListener('click', (e) => {
        if (e.target === modal) closeModal();
      });
      if (closeModalBtn) closeModalBtn.addEventListener('click', closeModal);
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && modal.classList.contains('active')) closeModal();
      });
    }
    
    // Делегирование событий для клика по изображениям
    if (container) {
      container.addEventListener('click', (e) => {
        const targetImg = e.target.closest('.card-img img');
        if (targetImg && targetImg.src) {
          e.preventDefault();
          openModal(targetImg.src);
        }
      });
    }
    
    function init() {
      renderCatalog();
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => setFilter(btn.dataset.filter));
      });
      const searchInput = document.getElementById('searchInput');
      if (searchInput) searchInput.addEventListener('input', (e) => setSearchQuery(e.target.value));
      const clearBtn = document.getElementById('clearSearchBtn');
      if (clearBtn) clearBtn.addEventListener('click', () => {
        setSearchQuery('');
        if (searchInput) searchInput.value = '';
        searchInput?.focus();
      });
      const sortBtn = document.getElementById('sortByNameBtn');
      if (sortBtn) { sortBtn.addEventListener('click', toggleSortByName); updateSortButtonUI(); }
    }
    
    init();
    window.addEventListener('load', () => { if(container) container.style.opacity = '1'; });
</script>

<script>
function openApp(appUrl, webUrl) {
  const timeout = setTimeout(() => { window.location.href = webUrl; }, 1200);
  window.location.href = appUrl;
  window.onblur = () => clearTimeout(timeout);
}
</script>
