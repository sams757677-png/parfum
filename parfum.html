<style>
body {
    margin: 0;
    font-family: 'Montserrat', sans-serif;
    background: black;
    color: white;
}

/* Фон с эффектом */
.bg {
    position: fixed;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at 30% 30%, #222, #000);
    z-index: -1;
}

/* Контейнер */
.container {
    max-width: 400px;
    margin: auto;
    padding: 30px;
    text-align: center;
}

/* Аватар */
.avatar {
    width: 120px;
    border-radius: 50%;
    border: 2px solid gold;
    box-shadow: 0 0 20px gold;
}

/* Заголовок */
h1 {
    font-family: 'Playfair Display', serif;
    margin: 15px 0 5px;
    font-size: 28px;
}

/* Описание */
.desc {
    opacity: 0.7;
    margin-bottom: 20px;
}

/* Кнопки */
.btn {
    display: block;
    margin: 12px 0;
    padding: 14px;
    border-radius: 14px;
    text-decoration: none;
    color: black;
    background: linear-gradient(45deg, gold, #ffd700);
    font-weight: bold;
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.05);
    box-shadow: 0 0 15px gold;
}

/* Карточка */
.card {
    background: rgba(255,255,255,0.05);
    padding: 20px;
    border-radius: 20px;
    backdrop-filter: blur(10px);
}

/* Телефон */
.phone {
    margin-top: 10px;
    font-size: 18px;
}

/* Отзывы */
.reviews {
    margin-top: 25px;
    font-size: 14px;
    opacity: 0.8;
}

/* Анимация появления */
.fade {
    animation: fadeIn 1.5s ease;
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}
</style>

</head>
