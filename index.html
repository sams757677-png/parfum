    const containerGrid = document.getElementById('catalogGrid');
    const searchInput = document.getElementById('searchInput');
    const clearSearchBtn = document.getElementById('clearSearchBtn');
    
    let currentFilter = 'all';
    let searchQuery = '';

    // Рендер звёзд
    function renderStars(rating) {
        let stars = '';
        for(let i=1; i<=5; i++) {
            stars += (i <= rating) ? '<i class="fas fa-star"></i>' : '<i class="far fa-star"></i>';
        }
        return stars;
    }

    // Фильтрация по типу + поиск (по имени, тегу, описанию)
    function getFilteredPerfumes() {
        let filtered = perfumes;
        // фильтр по категории
        if (currentFilter !== 'all') {
            filtered = filtered.filter(p => p.type === currentFilter);
        }
        // поиск
        if (searchQuery.trim() !== '') {
            const lowerQuery = searchQuery.toLowerCase().trim();
            filtered = filtered.filter(p => 
                p.name.toLowerCase().includes(lowerQuery) ||
                p.tag.toLowerCase().includes(lowerQuery) ||
                p.desc.toLowerCase().includes(lowerQuery)
            );
        }
        return filtered;
    }

    // Отрисовка каталога с учетом поиска и фильтра
    function renderCatalog() {
        const filteredPerfumes = getFilteredPerfumes();
        
        if (!containerGrid) return;

        if (filteredPerfumes.length === 0) {
            containerGrid.innerHTML = `
                <div class="no-results">
                    <i class="fas fa-search"></i>
                    <p>Ничего не найдено 😔<br>Попробуйте другой аромат или снимите фильтр</p>
                </div>
            `;
            return;
        }

        let html = '';
        filteredPerfumes.forEach(perf => {
            const badgeHtml = perf.badge ? `<div class="badge">${perf.badge}</div>` : '';
            const waLink = `https://wa.me/+79112402051?text=${encodeURIComponent(perf.waMsg + ' — AR PERFUME')}`;
            html += `
                <div class="card" style="animation: fadeUp 0.4s ease backwards;">
                    <div class="card-img">
                        <img src="${perf.img}" alt="${perf.name}" loading="lazy">
                        ${badgeHtml}
                    </div>
                    <div class="card-body">
                        <div class="card-title">${perf.name}</div>
                        <div class="tag"><i class="fas fa-feather-alt"></i> ${perf.tag}</div>
                        <div class="card-desc">${perf.desc}</div>
                        <div class="rating">${renderStars(perf.rating)}</div>
                        <div class="price">${perf.price} <small>/${perf.volume}</small></div>
                        <a href="${waLink}" class="buy-btn" target="_blank" rel="noopener noreferrer">
                            <i class="fab fa-whatsapp"></i> Заказать
                        </a>
                    </div>
                </div>
            `;
        });
        containerGrid.innerHTML = html;
    }

    // Обновление с плавным эффектом
    let renderTimeout = null;
    function applyFiltersAndRender() {
        if (renderTimeout) clearTimeout(renderTimeout);
        // небольшая задержка для плавности при активном поиске
        renderTimeout = setTimeout(() => {
            if (containerGrid) containerGrid.style.opacity = '0.5';
            setTimeout(() => {
                renderCatalog();
                if (containerGrid) containerGrid.style.opacity = '1';
            }, 80);
        }, 40);
    }

    // Обработчик смены фильтра
    function setFilter(filterValue) {
        currentFilter = filterValue;
        document.querySelectorAll('.filter-btn').forEach(btn => {
            if (btn.dataset.filter === filterValue) btn.classList.add('active');
            else btn.classList.remove('active');
        });
        applyFiltersAndRender();
    }

    // Обработчик поиска (input)
    function onSearchInput() {
        searchQuery = searchInput.value;
        applyFiltersAndRender();
        // Показывать или скрывать кнопку очистки
        if (clearSearchBtn) {
            clearSearchBtn.style.opacity = searchQuery.length > 0 ? '1' : '0.5';
            clearSearchBtn.style.pointerEvents = searchQuery.length > 0 ? 'auto' : 'none';
        }
    }
    
    // Очистка поиска
    function clearSearch() {
        if (searchInput) {
            searchInput.value = '';
            searchQuery = '';
            applyFiltersAndRender();
            searchInput.focus();
            if (clearSearchBtn) {
                clearSearchBtn.style.opacity = '0.5';
                clearSearchBtn.style.pointerEvents = 'none';
            }
        }
    }

    // Инициализация событий фильтров
    function initFilters() {
        const btns = document.querySelectorAll('.filter-btn');
        btns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                const filterVal = btn.dataset.filter;
                setFilter(filterVal);
            });
        });
        
        // Поиск
        if (searchInput) {
            searchInput.addEventListener('input', onSearchInput);
        }
        if (clearSearchBtn) {
            clearSearchBtn.addEventListener('click', clearSearch);
            // начальное состояние
            clearSearchBtn.style.opacity = '0.5';
            clearSearchBtn.style.pointerEvents = 'none';
        }
        
        // Начальный рендер
        renderCatalog();
    }

    // Функции для открытия мессенджеров (как в исходном)
    function openTelegram(username) {
        const app = `tg://resolve?domain=${username}`;
        const web = `https://t.me/${username}`;
        window.location.href = app;
        setTimeout(() => { window.open(web, "_blank"); }, 1200);
    }
    function openApp(appUrl, webUrl) {
        const timeout = setTimeout(() => { window.location.href = webUrl; }, 1200);
        window.location.href = appUrl;
        window.onblur = () => clearTimeout(timeout);
    }

    window.openTelegram = openTelegram;
    window.openApp = openApp;

    // Старт
    initFilters();
</script>
</body>
</html>
