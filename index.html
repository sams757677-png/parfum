<style>
body {
    margin: 0;
    font-family: 'Montserrat', sans-serif;
    background: black;

}

/* Фон с эффектом */
.bg {
    position: fixed;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at 30% 30%, #222, #000);
    z-index: -1;
}

/* Контейнер */
.container {
    max-width: 400px;
    margin: auto;
    padding: 30px;
    text-align: center;
}

/* Аватар */
.avatar {
    width: 120px;
    border-radius: 50%;
    border: 2px solid gold;
    box-shadow: 0 0 20px gold;
}

/* Заголовок */
h1 {
    font-family: 'Playfair Display', serif;
    margin: 15px 0 5px;
    font-size: 28px;
}

/* Описание */
.desc {
    opacity: 0.7;
    margin-bottom: 20px;
}

/* Кнопки */
.btn {
    display: block;
    margin: 12px 0;
    padding: 14px;
    border-radius: 14px;
    text-decoration: none;
    color: black;
    background: linear-gradient(45deg, gold, #ffd700);
    font-weight: bold;
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.05);
    box-shadow: 0 0 15px gold;
}

/* Карточка */
.card {
    background: rgba(255,255,255,0.05);
    padding: 20px;
    border-radius: 20px;
    backdrop-filter: blur(10px);
}

/* Телефон */
.phone {
    margin-top: 10px;
    font-size: 18px;
}

/* Отзывы */
.reviews {
    margin-top: 25px;
    font-size: 14px;
    opacity: 0.8;
}

/* Анимация появления */
.fade {
    animation: fadeIn 1.5s ease;
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}

.social-block {
    margin: 40px auto;
    padding: 25px;
    max-width: 600px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(212,175,55,0.2);
    border-radius: 20px;
    backdrop-filter: blur(12px);
    text-align: center;
}

.social-title {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    margin-bottom: 15px;
    letter-spacing: 1px;
    color: #d4af37;
}

.social-buttons {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 12px;
}

.social-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    border-radius: 12px;
    text-decoration: none;
    color: white;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    transition: 0.3s;
    font-size: 14px;
}

.social-btn:hover {
    transform: translateY(-3px);
    border-color: #d4af37;
    box-shadow: 0 0 15px rgba(212,175,55,0.2);
}

.social-btn i {
    font-size: 16px;
    color: #d4af37;
}

/* MAX иконка */

    justify-content: center;

    font-weight: bold;
    border-radius: 4px;
    font-size: 11px;

@media (max-width: 600px) {

}

<script>
function openTelegram(username) {
    const app = `tg://resolve?domain=${username}`;
    const web = `https://t.me/${username}`;

    window.location.href = app;

    setTimeout(() => {
        window.open(web, "_blank");
    }, 1200);
}
</script>

<script>
function openApp(appUrl, webUrl) {
    const timeout = setTimeout(() => {
        window.location.href = webUrl;
    }, 1200);

    window.location.href = appUrl;

    window.onblur = () => clearTimeout(timeout);
}
</script>
